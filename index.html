<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Water SaaS - Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-app: #09090b;
            --bg-card: #18181b;
            --bg-card-highlight: #27272a;
            --border-color: #27272a;
            --primary-blue: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --success-green: #22c55e;
            --warning-yellow: #eab308;
            --radius-card: 16px;
            --radius-button: 12px;
            --radius-pill: 9999px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            /* Dejar espacio para la consola flotante */
            padding-bottom: 250px; 
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
        }

        .logo i { color: var(--primary-blue); }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* --- Setup Section --- */
        .setup-wrapper { display: flex; flex-direction: column; gap: 24px; }

        .location-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 24px;
            margin-bottom: 24px;
        }

        .location-row {
            display: flex; align-items: center; gap: 16px;
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .location-icon { color: var(--text-muted); display: flex; }
        .location-text { flex: 1; }
        .location-address { font-weight: 500; font-size: 0.95rem; line-height: 1.4; }
        .location-coords { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }

        .input-group { margin-bottom: 8px; }
        .input-label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .input {
            width: 100%; background: var(--bg-app); border: 1px solid var(--border-color);
            border-radius: var(--radius-button); padding: 14px 16px; color: var(--text-main);
            font-size: 1rem; transition: border-color 0.2s; outline: none;
        }
        .input:focus { border-color: var(--primary-blue); }

        /* --- Buttons --- */
        .btn {
            background: var(--text-main); color: var(--bg-app); border: none;
            border-radius: var(--radius-button); padding: 16px 24px; font-weight: 600;
            font-size: 0.95rem; cursor: pointer; width: 100%; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        .btn-primary { background: var(--primary-blue); color: #ffffff; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* --- App Section --- */
        .catalog { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .product-card {
            background: var(--bg-app); border: 1px solid var(--border-color);
            border-radius: var(--radius-card); padding: 20px 16px; text-align: center;
            cursor: pointer; transition: all 0.2s ease;
        }
        .product-card.selected { border-color: var(--primary-blue); background: rgba(59, 130, 246, 0.05); }
        .product-card.disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .product-icon { color: var(--text-muted); margin-bottom: 12px; display: flex; justify-content: center; }
        .product-card.selected .product-icon { color: var(--primary-blue); }
        .product-name { font-weight: 600; font-size: 0.95rem; margin: 0 0 4px; }
        .product-price { color: var(--text-main); font-weight: 700; font-size: 1.1rem; }
        .product-available { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }

        /* --- Orders & History --- */
        .order-section {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-card); padding: 24px; margin-bottom: 24px;
        }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--text-main); }
        .order-summary {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 0; border-bottom: 1px solid var(--border-color); font-size: 0.95rem;
        }
        .order-summary:last-of-type { border-bottom: none; margin-bottom: 16px; }
        .qty-controls {
            display: flex; align-items: center; gap: 16px; background: var(--bg-app);
            padding: 4px 12px; border-radius: var(--radius-pill); border: 1px solid var(--border-color);
        }
        .qty-btn {
            background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem;
            cursor: pointer; padding: 4px; display: flex; align-items: center;
        }
        .qty-btn:hover { color: var(--text-main); }
        .total { font-weight: 700; font-size: 1.1rem; }
        
        .history-item {
            background: var(--bg-app); border: 1px solid var(--border-color);
            border-radius: var(--radius-card); padding: 16px; margin-bottom: 12px;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .history-title { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        .badge {
            display: inline-flex; align-items: center; padding: 4px 10px; border-radius: var(--radius-pill);
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .badge-pendiente { background: rgba(234,179,8,0.1); color: var(--warning-yellow); border: 1px solid rgba(234,179,8,0.2); }
        .badge-en_ruta { background: rgba(59,130,246,0.1); color: var(--primary-blue); border: 1px solid rgba(59,130,246,0.2); }
        .badge-completado { background: rgba(34,197,94,0.1); color: var(--success-green); border: 1px solid rgba(34,197,94,0.2); }
        .history-details { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); }

        /* --- Tabs --- */
        .tab-bar {
            display: flex; gap: 8px; margin-bottom: 24px; background: var(--bg-card);
            padding: 6px; border-radius: var(--radius-pill); border: 1px solid var(--border-color);
        }
        .tab {
            flex: 1; padding: 10px; border-radius: var(--radius-pill); text-align: center;
            font-weight: 500; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; transition: all 0.2s;
        }
        .tab.active { background: var(--bg-card-highlight); color: var(--text-main); }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- DEBUG CONSOLE --- */
        #debug-console {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 220px;
            background: rgba(0, 0, 0, 0.95);
            border-top: 2px solid #3b82f6;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            font-family: monospace;
            font-size: 11px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
        }
        #debug-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 8px 12px;
            color: #fff;
            font-weight: bold;
        }
        #debug-logs {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            color: #4ade80; /* Texto verde terminal */
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-error { color: #f87171 !important; }
        .log-warn { color: #facc15 !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><i data-lucide="droplet"></i> WaterApp</div>
            <div class="subtitle">Agua purificada a tu puerta</div>
        </div>

        <div id="setup-section" class="view">
            <div class="setup-wrapper">
                <div class="location-card">
                    <div class="input-group">
                        <label class="input-label">Número de teléfono</label>
                        <input type="tel" class="input" id="telefono" placeholder="+54 11 1234-5678">
                    </div>
                    <div class="location-row">
                        <div class="location-icon"><i data-lucide="map-pin"></i></div>
                        <div class="location-text">
                            <div class="location-address" id="direccion-text">Obteniendo ubicación...</div>
                            <div class="location-coords" id="coords-text">Por favor, espera</div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-primary" id="btn-confirmar-ubicacion">
                    Continuar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>
                </button>
            </div>
        </div>

        <div id="app-section" class="view">
            <div class="tab-bar">
                <div class="tab active" data-tab="pedir">Nuevo Pedido</div>
                <div class="tab" data-tab="historial">Mis Pedidos</div>
            </div>

            <div id="view-pedir" class="view active">
                <div class="section-title">Catálogo disponible</div>
                <div class="catalog" id="catalog"></div>
                
                <div class="order-section" id="order-summary" style="display: none;">
                    <div class="section-title" style="margin-bottom: 8px;">Resumen</div>
                    <div class="order-summary">
                        <span style="color: var(--text-muted);">Producto</span>
                        <span id="order-product-name" style="font-weight: 500;">-</span>
                    </div>
                    <div class="order-summary">
                        <span style="color: var(--text-muted);">Cantidad</span>
                        <div class="qty-controls">
                            <button class="qty-btn" id="btn-minus"><i data-lucide="minus" style="width: 16px;"></i></button>
                            <span id="cantidad" style="font-weight: 600; min-width: 20px; text-align: center;">1</span>
                            <button class="qty-btn" id="btn-plus"><i data-lucide="plus" style="width: 16px;"></i></button>
                        </div>
                    </div>
                    <div class="order-summary total">
                        <span>Total a pagar</span>
                        <span id="order-total">$0.00</span>
                    </div>
                    <button class="btn btn-primary" id="btn-realizar-pedido">
                        <i data-lucide="check" style="width: 18px;"></i> Confirmar Pedido
                    </button>
                </div>
            </div>

            <div id="view-historial" class="view">
                <div class="section-title">Historial de compras</div>
                <div id="historial-list"></div>
            </div>
        </div>
    </div>

    <div id="debug-console">
        <div id="debug-header">
            <span>Terminal de Depuración</span>
            <div style="display: flex; gap: 8px;">
                <button onclick="copyLogs()" style="background:#3b82f6; color:#fff; border:none; padding:4px 10px; border-radius:6px; font-weight:bold;">Copiar Logs</button>
                <button onclick="document.getElementById('debug-console').style.display='none'" style="background:#ef4444; color:#fff; border:none; padding:4px 10px; border-radius:6px; font-weight:bold;">X</button>
            </div>
        </div>
        <div id="debug-logs"></div>
    </div>

    <script>
        // --- SISTEMA DE LOGS ---
        function logger(msg, type = 'info') {
            const logsBox = document.getElementById('debug-logs');
            const line = document.createElement('div');
            
            let text = typeof msg === 'object' ? JSON.stringify(msg, null, 2) : msg;
            line.textContent = `[${new Date().toLocaleTimeString()}] > ${text}`;
            
            if(type === 'error') line.className = 'log-error';
            if(type === 'warn') line.className = 'log-warn';
            
            logsBox.appendChild(line);
            logsBox.scrollTop = logsBox.scrollHeight;
        }

        window.onerror = function(msg, url, line) {
            logger(`CRITICAL ERROR: ${msg} en línea ${line}`, 'error');
        };

        function copyLogs() {
            const text = document.getElementById('debug-logs').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('¡Código de error copiado al portapapeles!');
            }).catch(err => {
                logger('Fallo al copiar: ' + err, 'error');
            });
        }
        
        logger('Aplicación iniciada. Esperando acciones...');
        // -------------------------

        lucide.createIcons();

        const SUPABASE_URL = "https://wzixsohxprcobfsmiksf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aXhzb2h4cHJjb2Jmc21pa3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njg1MjUsImV4cCI6MjA5NzA0NDUyNX0.xBVJVEKVBoKjVzOt9TtrDtD1XkAMriq-de4yZdV9nHE";

        const headers = {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
        };

        let clienteActual = null;
        let ubicacionActual = null;
        let direccionLegible = "";
        let productoSeleccionado = null;
        let cantidad = 1;
        let stockActualLitros = 0;

        function checkSession() {
            logger('Revisando sesión guardada en LocalStorage...');
            const savedSession = localStorage.getItem('waterApp_session');
            if (savedSession) {
                const sessionData = JSON.parse(savedSession);
                
                // NUEVO: Verificamos que el cliente y su ID realmente existan
                if (sessionData && sessionData.clienteActual && sessionData.clienteActual.id) {
                    logger('Sesión válida encontrada. Cargando app directamente.');
                    clienteActual = sessionData.clienteActual;
                    ubicacionActual = sessionData.ubicacionActual;
                    direccionLegible = sessionData.direccionLegible;

                    document.getElementById('setup-section').classList.remove('active');
                    document.getElementById('app-section').classList.add('active');

                    cargarProductos();
                    cargarHistorial();
                } else {
                    // Si los datos están corruptos, limpiamos y pedimos registro de nuevo
                    logger('Sesión corrupta o incompleta. Borrando y pidiendo datos...', 'warn');
                    localStorage.removeItem('waterApp_session');
                    document.getElementById('setup-section').classList.add('active');
                    initLocation();
                }
            } else {
                logger('No hay sesión. Solicitando ubicación.');
                document.getElementById('setup-section').classList.add('active');
                initLocation();
            }
        }

        function initLocation() {
            if (navigator.geolocation) {
                logger('Iniciando GPS...');
                navigator.geolocation.getCurrentPosition(
                    async (pos) => {
                        ubicacionActual = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        logger(`Coordenadas obtenidas: ${ubicacionActual.lat}, ${ubicacionActual.lng}`);
                        document.getElementById('coords-text').textContent = `${ubicacionActual.lat.toFixed(6)}, ${ubicacionActual.lng.toFixed(6)}`;
                        try {
                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${ubicacionActual.lat}&lon=${ubicacionActual.lng}`);
                            const data = await res.json();
                            direccionLegible = data.display_name || "Dirección no encontrada";
                            document.getElementById('direccion-text').textContent = direccionLegible;
                            logger('Dirección procesada: ' + direccionLegible);
                        } catch (e) {
                            direccionLegible = "Sin dirección";
                            document.getElementById('direccion-text').textContent = direccionLegible;
                            logger('Error en Reverse Geocoding: ' + e.message, 'warn');
                        }
                    },
                    (err) => {
                        logger('Error GPS: ' + err.message, 'error');
                        alert("Necesitamos tu ubicación para continuar. Activa el GPS.");
                        document.getElementById('direccion-text').textContent = "Permiso denegado";
                    }
                );
            } else {
                logger('Geolocalización no soportada.', 'error');
            }
        }

        async function encontrarOCrearCliente(telefono) {
            logger(`Buscando cliente en BD con teléfono: ${telefono}`);
            const res = await fetch(`${SUPABASE_URL}/rest/v1/clientes?telefono=eq.${telefono}&select=*`, { headers });
            const clientes = await res.json();
            if (clientes.length > 0) {
                logger('Cliente existente encontrado.');
                return clientes[0];
            }
            
            logger('Cliente no existe, creando uno nuevo...');
            const nuevo = await fetch(`${SUPABASE_URL}/rest/v1/clientes`, {
                method: 'POST',
                headers: { ...headers, 'Prefer': 'return=representation' },
                body: JSON.stringify({
                    nombre: "Cliente App",
                    telefono: telefono,
                    direccion: direccionLegible,
                    lat: ubicacionActual.lat,
                    lng: ubicacionActual.lng
                })
            });
            return (await nuevo.json())[0];
        }

        document.getElementById('btn-confirmar-ubicacion').addEventListener('click', async () => {
            const telefono = document.getElementById('telefono').value.trim();
            if (!telefono) return alert("Ingresá tu teléfono");
            if (!ubicacionActual) return alert("Esperá la ubicación...");
            
            const btn = document.getElementById('btn-confirmar-ubicacion');
            btn.disabled = true; 
            btn.innerHTML = `<i data-lucide="loader" class="spin"></i> Procesando...`;
            lucide.createIcons();

            try {
                clienteActual = await encontrarOCrearCliente(telefono);
                logger('Cliente validado en sistema. ID: ' + clienteActual.id);
                
                localStorage.setItem('waterApp_session', JSON.stringify({
                    clienteActual, ubicacionActual, direccionLegible
                }));

                document.getElementById('setup-section').classList.remove('active');
                document.getElementById('app-section').classList.add('active');
                
                await cargarProductos();
                cargarHistorial();
            } catch (e) {
                logger('Error validando cliente: ' + e.message, 'error');
                alert("Error conectando al servidor.");
            }
            
            btn.disabled = false; 
            btn.innerHTML = `Continuar <i data-lucide="arrow-right" style="width: 18px; height: 18px;"></i>`;
            lucide.createIcons();
        });

        async function cargarProductos() {
            logger('Consultando stock actual...');
            try {
                const [stockRes] = await fetch(`${SUPABASE_URL}/rest/v1/stock_agua?select=litros_disponibles&limit=1`, { headers }).then(r => r.json());
                stockActualLitros = stockRes?.litros_disponibles || 0;
                logger(`Stock disponible en sistema: ${stockActualLitros} Litros`);
            } catch (e) {
                logger('Error obteniendo stock: ' + e.message, 'warn');
                stockActualLitros = 0;
            }

            logger('Cargando catálogo de productos...');
            const res = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&order=id.asc`, { headers });
            const productos = await res.json();

            const catalog = document.getElementById('catalog');
            catalog.innerHTML = productos.map(p => {
                const capacidad = p.capacidad_litros || 0;
                const disponibles = capacidad > 0 ? Math.floor(stockActualLitros / capacidad) : 0;
                const sinStock = disponibles <= 0;
                return `
                    <div class="product-card ${sinStock ? 'disabled' : ''}" data-id="${p.id}" data-nombre="${p.nombre}" data-precio="${p.precio}" data-litros="${capacidad}">
                        <div class="product-icon"><i data-lucide="package" style="width: 32px; height: 32px;"></i></div>
                        <div class="product-name">${p.nombre}</div>
                        <div class="product-price">$${p.precio}</div>
                        <div class="product-available">${capacidad}L • ${sinStock ? 'Agotado' : `${disponibles} disp.`}</div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();

            document.querySelectorAll('.product-card:not(.disabled)').forEach(card => {
                card.addEventListener('click', () => {
                    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                    productoSeleccionado = {
                        id: card.dataset.id,
                        nombre: card.dataset.nombre,
                        precio: parseFloat(card.dataset.precio),
                        capacidad_litros: parseInt(card.dataset.litros) || 0
                    };
                    cantidad = 1;
                    actualizarResumenPedido();
                    document.getElementById('order-summary').style.display = 'block';
                    logger(`Producto seleccionado: ${productoSeleccionado.nombre}`);
                });
            });
        }

        function actualizarResumenPedido() {
            if (!productoSeleccionado) return;
            document.getElementById('order-product-name').textContent = productoSeleccionado.nombre;
            document.getElementById('cantidad').textContent = cantidad;
            document.getElementById('order-total').textContent = `$${(productoSeleccionado.precio * cantidad).toFixed(2)}`;
        }

        document.getElementById('btn-plus').addEventListener('click', () => { cantidad++; actualizarResumenPedido(); });
        document.getElementById('btn-minus').addEventListener('click', () => { if (cantidad > 1) cantidad--; actualizarResumenPedido(); });

        document.getElementById('btn-realizar-pedido').addEventListener('click', async () => {
            if (!productoSeleccionado || !clienteActual) {
                logger('Intento de pedido fallido: Faltan datos (producto o cliente).', 'error');
                return;
            }
            
            const montoTotal = productoSeleccionado.precio * cantidad;
            const litrosADescontar = productoSeleccionado.capacidad_litros * cantidad;
            
            logger(`Iniciando creación de pedido... Monto: $${montoTotal}, Litros a descontar: ${litrosADescontar}`);
            
            const btn = document.getElementById('btn-realizar-pedido');
            btn.disabled = true;

            try {
                if (litrosADescontar > 0 && litrosADescontar > stockActualLitros) {
                    btn.disabled = false;
                    logger('Error: Stock insuficiente.', 'warn');
                    return alert('No hay suficiente agua en stock para este pedido.');
                }

                const payload = {
                    cliente_id: clienteActual.id,
                    producto_id: productoSeleccionado.id,
                    lat: ubicacionActual.lat,
                    lng: ubicacionActual.lng,
                    monto: montoTotal,
                    estado: 'pendiente'
                };
                
                logger('Enviando datos a Supabase tabla [pedidos]:');
                logger(payload);

                const pedidoRes = await fetch(`${SUPABASE_URL}/rest/v1/pedidos`, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=representation' },
                    body: JSON.stringify(payload)
                });
                
                logger('Código de estado HTTP de pedido: ' + pedidoRes.status);
                
                if (!pedidoRes.ok) {
                    const errRes = await pedidoRes.text();
                    throw new Error(`DB Error: ${errRes}`);
                }

                const nuevoPedido = await pedidoRes.json();
                logger('Respuesta JSON de Supabase:');
                logger(nuevoPedido);

                if (nuevoPedido && nuevoPedido[0]) {
                    if (litrosADescontar > 0) {
                        logger('Procediendo a descontar stock...');
                        const [stock] = await fetch(`${SUPABASE_URL}/rest/v1/stock_agua?select=id,litros_disponibles&limit=1`, { headers }).then(r => r.json());
                        const nuevoStock = stock.litros_disponibles - litrosADescontar;
                        await fetch(`${SUPABASE_URL}/rest/v1/stock_agua?id=eq.${stock.id}`, {
                            method: 'PATCH',
                            headers: { ...headers, 'Prefer': 'return=minimal' },
                            body: JSON.stringify({ litros_disponibles: nuevoStock })
                        });
                        stockActualLitros = nuevoStock;
                        logger('Stock descontado correctamente.');
                    }

                    alert("¡Pedido realizado con éxito!");
                    productoSeleccionado = null;
                    document.querySelectorAll('.product-card').forEach(c => c.classList.remove('selected'));
                    document.getElementById('order-summary').style.display = 'none';
                    cargarProductos();
                    cargarHistorial();
                } else {
                    throw new Error("Respuesta de Supabase vacía o inesperada");
                }
            } catch (e) {
                logger('EXCEPCION CAPTURADA EN PEDIDO: ' + e.message, 'error');
                alert("Error al crear el pedido, revisa la consola.");
            }
            btn.disabled = false;
        });

        async function cargarHistorial() {
            if (!clienteActual) return;
            logger('Obteniendo historial de pedidos...');
            const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?cliente_id=eq.${clienteActual.id}&select=id,productos(nombre),monto,estado,fecha_pedido&order=fecha_pedido.desc`, { headers });
            const pedidos = await res.json();
            const container = document.getElementById('historial-list');
            
            if (pedidos.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px 0; color: var(--text-muted);">
                        <i data-lucide="inbox" style="width: 40px; height: 40px; margin-bottom: 12px; opacity: 0.5;"></i>
                        <p>No tienes pedidos todavía.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }
            
            container.innerHTML = pedidos.map(p => {
                const badgeClass = `badge-${p.estado}`;
                return `
                    <div class="history-item">
                        <div class="history-header">
                            <strong class="history-title">
                                <i data-lucide="box" style="width: 16px;"></i>
                                ${p.productos?.nombre || 'Producto'}
                            </strong>
                            <span class="badge ${badgeClass}">${p.estado}</span>
                        </div>
                        <div class="history-details">
                            <span>${new Date(p.fecha_pedido).toLocaleDateString()}</span>
                            <span style="font-weight: 500; color: var(--text-main);">$${p.monto.toFixed(2)}</span>
                        </div>
                    </div>
                `;
            }).join('');
            
            lucide.createIcons();
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                document.getElementById('view-pedir').classList.toggle('active', tabName === 'pedir');
                document.getElementById('view-historial').classList.toggle('active', tabName === 'historial');
            });
        });

        checkSession();
    </script>
</body>
</html>
