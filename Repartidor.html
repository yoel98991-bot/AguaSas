<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repartidor - WaterApp</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-app: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --primary-blue: #3b82f6;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --success-green: #22c55e;
            --danger-red: #ef4444;
            --radius-card: 16px;
            --radius-button: 12px;
            --radius-pill: 9999px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 600px; margin: 0 auto; width: 100%; padding: 20px; flex: 1; }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px;
            margin-bottom: 20px;
        }
        .login-card input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-button);
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 1rem;
            margin-top: 8px;
        }
        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-button);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-success { background: var(--success-green); color: #000; }
        .btn-danger { background: var(--danger-red); }
        #map {
            height: 300px;
            border-radius: var(--radius-card);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: #1a1a1a;
        }
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 16px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .order-meta {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .btn-take {
            background: var(--success-green);
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: var(--radius-button);
            font-weight: 600;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .leaflet-control-zoom { display: none; }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        .hidden { display: none; }
        .current-order {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px;
            margin-bottom: 20px;
        }
        .current-order h3 { margin-bottom: 12px; }
        .current-order p { margin-bottom: 6px; }

        /* Pestañas */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border-radius: var(--radius-pill);
            text-align: center;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
        }
        .tab.active { background: var(--primary-blue); color: white; }

        /* Perfil */
        .profile-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px;
        }
        .avatar-preview {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--bg-card-highlight, #1E253A);
            margin: 0 auto 16px;
            background-size: cover;
            background-position: center;
            border: 2px solid var(--primary-blue);
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-app);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-button);
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login -->
        <div id="login-section" class="login-card">
            <label>Tu teléfono (registrado en el sistema)</label>
            <input type="tel" id="telefonoChofer" placeholder="Ej: 1123456789">
            <button class="btn" id="btn-ingresar">Ingresar</button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; display: none;"></p>
        </div>

        <!-- Zona de trabajo -->
        <div id="work-section" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span id="chofer-nombre" style="font-weight: 600;"></span>
                <button class="btn btn-danger" id="btn-salir">Salir</button>
            </div>

            <!-- Pestañas -->
            <div class="tabs">
                <div class="tab active" data-tab="ruta">📍 Ruta</div>
                <div class="tab" data-tab="perfil">👤 Perfil</div>
            </div>

            <!-- Contenido de Ruta -->
            <div id="tab-ruta" class="tab-content">
                <div id="map"></div>

                <!-- Pedido en curso -->
                <div id="pedido-en-ruta" class="current-order hidden">
                    <h3>🚚 Pedido en curso</h3>
                    <p><strong>Cliente:</strong> <span id="ruta-cliente"></span></p>
                    <p><strong>Dirección:</strong> <span id="ruta-direccion"></span></p>
                    <p><strong>Teléfono:</strong> <span id="ruta-telefono"></span></p>
                    <p><strong>Monto:</strong> $<span id="ruta-monto"></span></p>
                    <button class="btn btn-success" id="btn-entregar">Entregar Pedido</button>
                    <p id="error-venta" style="color: #ef4444; font-size: 0.8rem; margin-top: 8px; display: none;"></p>
                </div>

                <!-- Lista de pendientes -->
                <div id="lista-pendientes" class="order-list">
                    <p style="text-align: center; color: var(--text-muted);">Cargando pedidos...</p>
                </div>
            </div>

            <!-- Contenido de Perfil -->
            <div id="tab-perfil" class="tab-content hidden">
                <div class="profile-section">
                    <div class="avatar-preview" id="avatar-preview" style="background-image: url('https://via.placeholder.com/80');"></div>
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" id="perfil-nombre" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="tel" id="perfil-telefono" placeholder="Tu teléfono">
                    </div>
                    <div class="form-group">
                        <label>URL de imagen (opcional)</label>
                        <input type="url" id="perfil-imagen" placeholder="https://ejemplo.com/foto.jpg">
                    </div>
                    <button class="btn" id="btn-guardar-perfil">Guardar cambios</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wzixsohxprcobfsmiksf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aXhzb2h4cHJjb2Jmc21pa3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njg1MjUsImV4cCI6MjA5NzA0NDUyNX0.xBVJVEKVBoKjVzOt9TtrDtD1XkAMriq-de4yZdV9nHE";
        const headers = {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
        };

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let choferActual = null;
        let mapa = null;
        let marcadorChofer = null;
        let marcadorCliente = null;
        let miUbicacion = null;
        let miHeading = 0; // orientación actual
        let envioUbicacionInterval = null;
        let pedidoEnRuta = null;
        let canalesActivos = [];

        function unsubscribeAll() {
            canalesActivos.forEach(ch => supabaseClient.removeChannel(ch));
            canalesActivos = [];
        }

        // ----- NAVEGACIÓN POR PESTAÑAS -----
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.getElementById('tab-ruta').classList.toggle('hidden', tabId !== 'ruta');
                document.getElementById('tab-perfil').classList.toggle('hidden', tabId !== 'perfil');

                if (tabId === 'ruta') {
                    if (mapa) mapa.invalidateSize();
                    cargarPedidos();
                } else if (tabId === 'perfil') {
                    cargarPerfil();
                }
            });
        });

        // ----- LOGIN -----
        document.getElementById('btn-ingresar').addEventListener('click', async () => {
            const telefono = document.getElementById('telefonoChofer').value.trim();
            if (!telefono) {
                document.getElementById('login-error').textContent = 'Ingresá tu teléfono.';
                document.getElementById('login-error').style.display = 'block';
                return;
            }
            const btn = document.getElementById('btn-ingresar');
            btn.disabled = true; btn.textContent = 'Buscando...';
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/choferes?telefono=eq.${telefono}&select=*&limit=1`, { headers });
                const choferes = await res.json();
                if (choferes.length === 0) {
                    document.getElementById('login-error').textContent = 'Repartidor no encontrado.';
                    document.getElementById('login-error').style.display = 'block';
                    btn.disabled = false; btn.textContent = 'Ingresar';
                    return;
                }
                choferActual = choferes[0];
                document.getElementById('chofer-nombre').textContent = `🚚 ${choferActual.nombre}`;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('work-section').classList.remove('hidden');
                document.getElementById('login-error').style.display = 'none';
                await iniciarApp();
            } catch (error) {
                document.getElementById('login-error').textContent = 'Error de conexión.';
                document.getElementById('login-error').style.display = 'block';
                btn.disabled = false; btn.textContent = 'Ingresar';
            }
        });

        document.getElementById('btn-salir').addEventListener('click', () => {
            if (pedidoEnRuta) {
                alert('Primero entregá el pedido actual.');
                return;
            }
            if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
            unsubscribeAll();
            choferActual = null;
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('work-section').classList.add('hidden');
            document.getElementById('telefonoChofer').value = '';
        });

        async function iniciarApp() {
            // Activar GPS continuo para obtener ubicación y rumbo
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        miUbicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        miHeading = pos.coords.heading || 0; // grados (0 = norte)
                        actualizarMarcadorChofer();
                    },
                    (err) => console.warn('Error GPS:', err),
                    { enableHighAccuracy: true }
                );
            } else {
                alert('GPS no disponible');
            }
            // Iniciar mapa con ubicación inicial (aproximada)
            if (!miUbicacion) {
                miUbicacion = await getCurrentPosition();
            }
            initMap(miUbicacion.lat, miUbicacion.lng);
            await recuperarPedidoEnRuta();
            await cargarPedidos();
            subscribePendientes();
        }

        function initMap(lat, lng) {
            if (mapa) return;
            mapa = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(mapa);
            // Crear marcador del chofer con flecha orientable
            const arrowIcon = L.divIcon({
                html: '<div style="font-size: 28px; line-height: 1; transform-origin: center; transition: transform 0.3s;">▶</div>',
                className: '',
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });
            marcadorChofer = L.marker([lat, lng], { icon: arrowIcon }).addTo(mapa);
            // Actualizar rotación inicial
            actualizarRotacionFlecha();
        }

        function actualizarRotacionFlecha() {
            if (!marcadorChofer) return;
            const icon = marcadorChofer.getElement();
            if (!icon) return;
            const flecha = icon.querySelector('div');
            if (flecha) {
                flecha.style.transform = `rotate(${miHeading}deg)`;
            }
        }

        function actualizarMarcadorChofer() {
            if (!marcadorChofer || !miUbicacion) return;
            marcadorChofer.setLatLng([miUbicacion.lat, miUbicacion.lng]);
            actualizarRotacionFlecha();
            // Centrar mapa en el chofer si no está siguiendo una ruta activa
            if (!pedidoEnRuta) {
                mapa.setView([miUbicacion.lat, miUbicacion.lng], mapa.getZoom());
            }
        }

        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject('GPS no soportado');
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        miHeading = pos.coords.heading || 0;
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    err => reject(err),
                    { enableHighAccuracy: true }
                );
            });
        }

        async function recuperarPedidoEnRuta() {
            if (!choferActual) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?chofer_id=eq.${choferActual.id}&estado=eq.en_ruta&select=id,lat,lng,cliente_id,monto,clientes(nombre,direccion,telefono)&limit=1`, { headers });
                const pedidos = await res.json();
                if (pedidos.length > 0) {
                    const p = pedidos[0];
                    const cliente = p.clientes || {};
                    pedidoEnRuta = {
                        id: p.id,
                        latCliente: p.lat,
                        lngCliente: p.lng,
                        choferId: choferActual.id,
                        cliente_id: p.cliente_id,
                        monto: p.monto,
                        cliente_nombre: cliente.nombre,
                        cliente_direccion: cliente.direccion,
                        cliente_telefono: cliente.telefono
                    };
                    mostrarPedidoEnCurso();
                }
            } catch (error) {
                console.error('Error al recuperar pedido en ruta:', error);
            }
        }

        function mostrarPedidoEnCurso() {
            document.getElementById('ruta-cliente').textContent = pedidoEnRuta.cliente_nombre || '-';
            document.getElementById('ruta-direccion').textContent = pedidoEnRuta.cliente_direccion || '-';
            document.getElementById('ruta-telefono').textContent = pedidoEnRuta.cliente_telefono || '-';
            document.getElementById('ruta-monto').textContent = pedidoEnRuta.monto;
            document.getElementById('pedido-en-ruta').classList.remove('hidden');
            document.getElementById('lista-pendientes').classList.add('hidden');

            if (marcadorCliente) mapa.removeLayer(marcadorCliente);
            const clienteIcon = L.divIcon({ html: '📍', className: '', iconSize: [24, 24], iconAnchor: [12, 24] });
            marcadorCliente = L.marker([pedidoEnRuta.latCliente, pedidoEnRuta.lngCliente], { icon: clienteIcon }).addTo(mapa);
            const bounds = L.latLngBounds([[miUbicacion.lat, miUbicacion.lng], [pedidoEnRuta.latCliente, pedidoEnRuta.lngCliente]]);
            mapa.fitBounds(bounds, { padding: [30, 30] });

            if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
            envioUbicacionInterval = setInterval(enviarUbicacion, 5000);
            enviarUbicacion();
        }

        function subscribePendientes() {
            unsubscribeAll();
            const channel = supabaseClient
                .channel('pendientes-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos', filter: 'estado=eq.pendiente' }, () => {
                    if (!pedidoEnRuta) cargarPedidos();
                })
                .subscribe();
            canalesActivos.push(channel);
        }

        async function cargarPedidos() {
            if (!choferActual || !miUbicacion) return;
            if (pedidoEnRuta) {
                document.getElementById('lista-pendientes').classList.add('hidden');
                return;
            }
            document.getElementById('lista-pendientes').classList.remove('hidden');
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?estado=eq.pendiente&select=id,monto,fecha_pedido,lat,lng,cliente_id,clientes(nombre,direccion,telefono)&order=fecha_pedido.asc`, { headers });
                const pedidos = await res.json();

                if (marcadorCliente) { mapa.removeLayer(marcadorCliente); marcadorCliente = null; }

                const pedidosConDistancia = pedidos.map(p => {
                    const dist = Math.sqrt(Math.pow(p.lat - miUbicacion.lat, 2) + Math.pow(p.lng - miUbicacion.lng, 2));
                    return { ...p, distancia: dist };
                }).sort((a, b) => a.distancia - b.distancia);

                const listDiv = document.getElementById('lista-pendientes');
                if (pedidosConDistancia.length === 0) {
                    listDiv.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No hay pedidos pendientes.</p>';
                    return;
                }

                listDiv.innerHTML = pedidosConDistancia.map(p => {
                    const cliente = p.clientes || {};
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <span>${cliente.nombre || 'Cliente'}</span>
                                <span>$${p.monto}</span>
                            </div>
                            <div class="order-meta">
                                <span>📞 ${cliente.telefono || 'N/D'}</span>
                                <span>📍 ${cliente.direccion || 'Sin dirección'}</span>
                                <span class="badge">${(p.distancia*111).toFixed(1)} km</span>
                            </div>
                            <button class="btn-take" onclick="tomarPedido(${p.id}, ${p.lat}, ${p.lng}, ${p.cliente_id}, '${cliente.nombre?.replace(/'/g, "\\'") || 'Cliente'}', '${cliente.direccion?.replace(/'/g, "\\'") || ''}', '${cliente.telefono?.replace(/'/g, "\\'") || ''}', ${p.monto})">Tomar pedido</button>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error(error);
                document.getElementById('lista-pendientes').innerHTML = '<p style="color:red;">Error al cargar pedidos.</p>';
            }
        }

        window.tomarPedido = async function(pedidoId, latCliente, lngCliente, clienteId, nombreCliente, direccionCliente, telefonoCliente, monto) {
            if (!choferActual) return;
            if (!confirm('¿Confirmar que tomas este pedido?')) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?id=eq.${pedidoId}`, {
                    method: 'PATCH',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ estado: 'en_ruta', chofer_id: choferActual.id })
                });
                if (!res.ok) throw new Error(await res.text());

                pedidoEnRuta = {
                    id: pedidoId,
                    latCliente,
                    lngCliente,
                    choferId: choferActual.id,
                    cliente_id: clienteId,
                    monto: monto,
                    cliente_nombre: nombreCliente,
                    cliente_direccion: direccionCliente,
                    cliente_telefono: telefonoCliente
                };

                mostrarPedidoEnCurso();
            } catch (error) {
                alert('Error al tomar pedido: ' + error.message);
            }
        };

        document.getElementById('btn-entregar').addEventListener('click', async () => {
            if (!pedidoEnRuta) return;
            if (!confirm('¿Confirmar entrega del pedido?')) return;
            document.getElementById('error-venta').style.display = 'none';
            try {
                const now = new Date().toISOString();
                const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?id=eq.${pedidoEnRuta.id}`, {
                    method: 'PATCH',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ estado: 'completado', fecha_entrega: now })
                });
                if (!patchRes.ok) throw new Error('Error al actualizar pedido: ' + await patchRes.text());

                const ventaRes = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        pedido_id: pedidoEnRuta.id,
                        cliente_id: pedidoEnRuta.cliente_id,
                        chofer_id: choferActual.id,
                        monto_final: pedidoEnRuta.monto,
                        metodo_pago: 'efectivo',
                        fecha_completado: now
                    })
                });

                if (!ventaRes.ok) {
                    const errorText = await ventaRes.text();
                    console.error('Error al insertar venta:', errorText);
                    document.getElementById('error-venta').textContent = 'Error al guardar venta: ' + errorText;
                    document.getElementById('error-venta').style.display = 'block';
                    return;
                }

                pedidoEnRuta = null;
                if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
                if (marcadorCliente) { mapa.removeLayer(marcadorCliente); marcadorCliente = null; }
                document.getElementById('pedido-en-ruta').classList.add('hidden');
                document.getElementById('lista-pendientes').classList.remove('hidden');
                await cargarPedidos();
            } catch (error) {
                alert('Error al entregar: ' + error.message);
            }
        });

        async function enviarUbicacion() {
            if (!pedidoEnRuta || !choferActual || !miUbicacion) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/ubicaciones_repartidor`, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        chofer_id: choferActual.id,
                        lat: miUbicacion.lat,
                        lng: miUbicacion.lng
                    })
                });
            } catch (e) {
                console.warn('No se pudo enviar ubicación:', e);
            }
        }

        // ----- PERFIL -----
        function cargarPerfil() {
            if (!choferActual) return;
            document.getElementById('perfil-nombre').value = choferActual.nombre || '';
            document.getElementById('perfil-telefono').value = choferActual.telefono || '';
            document.getElementById('perfil-imagen').value = choferActual.imagen_url || '';
            const avatar = document.getElementById('avatar-preview');
            if (choferActual.imagen_url) {
                avatar.style.backgroundImage = `url(${choferActual.imagen_url})`;
            } else {
                avatar.style.backgroundImage = "url('https://via.placeholder.com/80')";
            }
        }

        document.getElementById('btn-guardar-perfil').addEventListener('click', async () => {
            if (!choferActual) return;
            const nombre = document.getElementById('perfil-nombre').value.trim();
            const telefono = document.getElementById('perfil-telefono').value.trim();
            const imagen_url = document.getElementById('perfil-imagen').value.trim();

            if (!nombre || !telefono) {
                return alert('Nombre y teléfono son obligatorios.');
            }

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/choferes?id=eq.${choferActual.id}`, {
                    method: 'PATCH',
                    headers: { ...headers, 'Prefer': 'return=representation' },
                    body: JSON.stringify({ nombre, telefono, imagen_url })
                });
                if (!res.ok) throw new Error(await res.text());
                const actualizado = await res.json();
                choferActual = actualizado[0];
                document.getElementById('chofer-nombre').textContent = `🚚 ${choferActual.nombre}`;
                cargarPerfil();
                alert('Perfil actualizado.');
            } catch (e) {
                alert('Error al guardar: ' + e.message);
            }
        });
    </script>
</body>
</html>
