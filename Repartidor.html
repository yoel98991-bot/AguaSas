<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repartidor - WaterApp</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-app: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --primary-blue: #3b82f6;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --success-green: #22c55e;
            --radius-card: 16px;
            --radius-button: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container { max-width: 600px; margin: 0 auto; width: 100%; }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); margin-bottom: 20px; font-size: 0.9rem; }

        /* Tarjeta de identificación */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login-card label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .login-card input {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-button);
            padding: 12px 14px;
            color: var(--text-main);
            font-size: 1rem;
        }
        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: var(--radius-button);
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #map {
            height: 300px;
            border-radius: var(--radius-card);
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            background: #1a1a1a;
        }
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 16px;
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .order-meta {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .btn-take {
            background: var(--success-green);
            color: #000;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: var(--radius-button);
            font-weight: 600;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .leaflet-control-zoom { display: none; }
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Pedidos Pendientes</h1>
        <p class="subtitle">Asignados por orden de cercanía</p>

        <!-- Identificación del repartidor -->
        <div id="login-section" class="login-card">
            <label for="telefonoChofer">Tu número de teléfono (registrado en el sistema)</label>
            <input type="tel" id="telefonoChofer" placeholder="Ej: 1123456789">
            <button class="btn" id="btn-ingresar">Ingresar</button>
            <p id="login-error" style="color: #ef4444; font-size: 0.8rem; display: none;"></p>
        </div>

        <!-- Área de trabajo (oculta hasta login) -->
        <div id="work-section" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span id="chofer-nombre" style="font-weight: 600;"></span>
                <button class="btn" id="btn-salir" style="width: auto; padding: 6px 14px;">Salir</button>
            </div>
            <div id="map"></div>
            <div id="repartidor-list" class="order-list">
                <p style="text-align: center; color: var(--text-muted);">Cargando pedidos...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wzixsohxprcobfsmiksf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aXhzb2h4cHJjb2Jmc21pa3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njg1MjUsImV4cCI6MjA5NzA0NDUyNX0.xBVJVEKVBoKjVzOt9TtrDtD1XkAMriq-de4yZdV9nHE";
        const headers = {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
        };

        // Estado del repartidor
        let choferActual = null;      // { id, nombre, telefono, vehiculo }
        let mapa = null;
        let marcadorChofer = null;
        let marcadoresPedidos = [];
        let miUbicacion = null;
        let envioUbicacionInterval = null;
        let pedidoEnRuta = null;

        // --- FLUJO DE LOGIN POR TELÉFONO ---
        document.getElementById('btn-ingresar').addEventListener('click', async () => {
            const telefono = document.getElementById('telefonoChofer').value.trim();
            if (!telefono) {
                document.getElementById('login-error').textContent = 'Ingresá tu teléfono.';
                document.getElementById('login-error').style.display = 'block';
                return;
            }
            const btn = document.getElementById('btn-ingresar');
            btn.disabled = true;
            btn.textContent = 'Buscando...';
            try {
                // Buscar chofer por teléfono
                const res = await fetch(`${SUPABASE_URL}/rest/v1/choferes?telefono=eq.${telefono}&select=*&limit=1`, { headers });
                const choferes = await res.json();
                if (choferes.length === 0) {
                    document.getElementById('login-error').textContent = 'No se encontró un repartidor con ese teléfono. Contactá al administrador.';
                    document.getElementById('login-error').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Ingresar';
                    return;
                }
                // Login exitoso
                choferActual = choferes[0];
                document.getElementById('chofer-nombre').textContent = `🚚 ${choferActual.nombre}`;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('work-section').classList.remove('hidden');
                document.getElementById('login-error').style.display = 'none';
                await iniciarApp();
            } catch (error) {
                document.getElementById('login-error').textContent = 'Error de conexión.';
                document.getElementById('login-error').style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Ingresar';
            }
        });

        // Botón salir
        document.getElementById('btn-salir').addEventListener('click', () => {
            if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
            if (pedidoEnRuta) {
                alert('Tenés un pedido en curso. Entregalo antes de salir.');
                return;
            }
            choferActual = null;
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('work-section').classList.add('hidden');
            document.getElementById('telefonoChofer').value = '';
        });

        // --- FUNCIONES DEL REPARTIDOR ---
        async function iniciarApp() {
            try {
                miUbicacion = await getCurrentPosition();
                initMap(miUbicacion.lat, miUbicacion.lng);
            } catch (e) {
                alert('Activa el GPS para usar esta app.');
                initMap(-34.61, -58.37);
            }
            cargarPedidos();
            setInterval(cargarPedidos, 30000);
        }

        function initMap(lat, lng) {
            if (mapa) return;
            mapa = L.map('map', { zoomControl: false }).setView([lat, lng], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(mapa);
        }

        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject('GPS no soportado');
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    err => reject(err),
                    { enableHighAccuracy: true }
                );
            });
        }

        async function cargarPedidos() {
            if (!choferActual || !miUbicacion) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?estado=eq.pendiente&select=id,monto,fecha_pedido,lat,lng,clientes(nombre,direccion,telefono)&order=fecha_pedido.asc`, { headers });
                const pedidos = await res.json();

                marcadoresPedidos.forEach(m => mapa.removeLayer(m));
                marcadoresPedidos = [];

                const pedidosConDistancia = pedidos.map(p => {
                    const dist = Math.sqrt(Math.pow(p.lat - miUbicacion.lat, 2) + Math.pow(p.lng - miUbicacion.lng, 2));
                    return { ...p, distancia: dist };
                }).sort((a, b) => a.distancia - b.distancia);

                const listDiv = document.getElementById('repartidor-list');
                if (pedidosConDistancia.length === 0) {
                    listDiv.innerHTML = '<p style="text-align:center;color:var(--text-muted);">No hay pedidos pendientes.</p>';
                    return;
                }

                listDiv.innerHTML = pedidosConDistancia.map(p => {
                    const cliente = p.clientes || {};
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <span>${cliente.nombre || 'Cliente'}</span>
                                <span>$${p.monto}</span>
                            </div>
                            <div class="order-meta">
                                <span>📞 ${cliente.telefono || 'N/D'}</span>
                                <span>📍 ${cliente.direccion || 'Sin dirección'}</span>
                                <span class="badge">${(p.distancia*111).toFixed(1)} km</span>
                            </div>
                            <button class="btn-take" onclick="tomarPedido(${p.id}, ${p.lat}, ${p.lng})">Tomar pedido</button>
                        </div>
                    `;
                }).join('');

                pedidosConDistancia.forEach(p => {
                    const marker = L.marker([p.lat, p.lng]).addTo(mapa);
                    marker.bindPopup(`${p.clientes?.nombre || 'Cliente'}<br>$${p.monto}`);
                    marcadoresPedidos.push(marker);
                });

                if (marcadorChofer) mapa.removeLayer(marcadorChofer);
                const choferIcon = L.divIcon({ html: '🚚', className: '', iconSize: [24, 24], iconAnchor: [12, 12] });
                marcadorChofer = L.marker([miUbicacion.lat, miUbicacion.lng], { icon: choferIcon }).addTo(mapa);

                if (pedidosConDistancia.length > 0) {
                    const grupo = L.featureGroup([marcadorChofer, ...marcadoresPedidos]);
                    mapa.fitBounds(grupo.getBounds(), { padding: [30, 30] });
                }
            } catch (error) {
                console.error(error);
                document.getElementById('repartidor-list').innerHTML = '<p style="color:red;">Error al cargar pedidos.</p>';
            }
        }

        // Tomar pedido usando el choferActual.id
        window.tomarPedido = async function(pedidoId, latCliente, lngCliente) {
            if (!choferActual) return;
            if (!confirm('¿Confirmar que tomas este pedido?')) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?id=eq.${pedidoId}`, {
                    method: 'PATCH',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ estado: 'en_ruta', chofer_id: choferActual.id })
                });
                if (!res.ok) throw new Error(await res.text());

                pedidoEnRuta = { id: pedidoId, latCliente, lngCliente, choferId: choferActual.id };
                alert('Pedido tomado. Ahora compartirás tu ubicación.');

                if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
                envioUbicacionInterval = setInterval(enviarUbicacion, 5000);
                await enviarUbicacion();

                cargarPedidos();
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        async function enviarUbicacion() {
            if (!pedidoEnRuta || !choferActual) return;
            try {
                const pos = await getCurrentPosition();
                await fetch(`${SUPABASE_URL}/rest/v1/ubicaciones_repartidor`, {
                    method: 'POST',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        chofer_id: choferActual.id,
                        lat: pos.lat,
                        lng: pos.lng
                    })
                });
            } catch (e) {
                console.warn('No se pudo enviar ubicación:', e);
            }
        }
    </script>
</body>
</html>
