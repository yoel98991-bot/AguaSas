<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Repartidor - App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root {
            /* Paleta elegante oscura con acentos azules (estilo agua/clean) */
            --bg-app: #0f172a; /* Slate 900 */
            --bg-card: #1e293b; /* Slate 800 */
            --border-color: #334155;
            --primary-blue: #0ea5e9; /* Sky 500 */
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-green: #10b981;
            --danger-red: #ef4444;
            --radius-card: 20px;
            --radius-button: 14px;
            --radius-pill: 9999px;
            --shadow-card: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            width: 100%; 
            padding: 24px 20px; 
            flex: 1; 
            display: flex;
            flex-direction: column;
        }

        /* --- LOGIN --- */
        #login-section {
            margin: auto 0; /* Centrado vertical */
        }
        
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 32px 24px;
            box-shadow: var(--shadow-card);
            text-align: center;
        }

        .login-header {
            margin-bottom: 24px;
        }

        .login-header h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .login-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .login-card input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-button);
            padding: 14px 16px;
            color: var(--text-main);
            font-size: 1.1rem;
            margin-top: 16px;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 1px;
            transition: border-color 0.3s;
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        /* --- BOTONES --- */
        .btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px 20px;
            width: 100%;
            border-radius: var(--radius-button);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        
        .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; box-shadow: none; }
        
        .btn-success { background: var(--success-green); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .btn-success:hover { background: #059669; }
        
        .btn-danger { background: transparent; border: 1px solid var(--danger-red); color: var(--danger-red); padding: 8px 16px; width: auto; box-shadow: none; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

        /* --- UI PRINCIPAL --- */
        .top-bar {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 20px;
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: var(--radius-card);
            border: 1px solid var(--border-color);
        }

        #map {
            height: 320px;
            border-radius: var(--radius-card);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            background: #0f172a;
            box-shadow: var(--shadow-card);
            z-index: 1; /* Para evitar superposiciones raras */
        }

        .leaflet-control-zoom { display: none; }
        /* Filtro oscuro para el mapa */
        .leaflet-layer { filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%); }

        /* --- TARJETAS DE PEDIDO --- */
        .order-list { display: flex; flex-direction: column; gap: 16px; }
        
        .order-card, .current-order {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 20px;
            box-shadow: var(--shadow-card);
            transition: transform 0.2s;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .monto-tag {
            color: var(--success-green);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .order-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .order-meta div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            background: rgba(14, 165, 233, 0.15);
            color: var(--primary-blue);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 8px;
        }

        /* --- ANIMACIÓN RADAR (ESPERANDO PEDIDOS) --- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            background: var(--bg-card);
            border-radius: var(--radius-card);
            border: 1px dashed var(--border-color);
        }

        .radar-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--primary-blue);
            border-radius: 50%;
            opacity: 0;
            animation: radar-pulse 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        .pulse-ring:nth-child(2) { animation-delay: 1s; }

        @keyframes radar-pulse {
            0% { transform: scale(0.5); opacity: 0.8; }
            70%, 100% { transform: scale(2.5); opacity: 0; }
        }

        .realtime-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--success-green);
            margin-top: 12px;
            font-weight: 500;
        }

        .dot-flashing {
            width: 8px;
            height: 8px;
            background-color: var(--success-green);
            border-radius: 50%;
            animation: dot-blink 1.5s infinite linear;
        }

        @keyframes dot-blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- PESTAÑAS --- */
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: var(--bg-card);
            padding: 6px;
            border-radius: var(--radius-pill);
            border: 1px solid var(--border-color);
        }

        .tab {
            flex: 1;
            padding: 12px;
            border-radius: var(--radius-pill);
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active { 
            background: var(--primary-blue); 
            color: white; 
            box-shadow: 0 4px 10px rgba(14, 165, 233, 0.3);
        }

        /* --- PERFIL --- */
        .profile-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--shadow-card);
        }

        .avatar-preview {
            width: 100px; height: 100px;
            border-radius: 50%;
            background: #0f172a;
            margin: 0 auto 24px;
            background-size: cover;
            background-position: center;
            border: 3px solid var(--primary-blue);
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-button);
            color: var(--text-main);
            transition: border-color 0.3s;
        }
        .form-group input:focus { outline: none; border-color: var(--primary-blue); }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        
        <div id="login-section" class="login-card">
            <div class="login-header">
                <h2>👋 Bienvenido</h2>
                <p>Ingresa tu número para comenzar tu ruta</p>
            </div>
            <input type="tel" id="telefonoChofer" placeholder="Ej: 04120000000">
            <button class="btn" id="btn-ingresar">Ingresar al sistema</button>
            <p id="login-error" style="color: var(--danger-red); font-size: 0.85rem; margin-top: 12px; display: none;"></p>
        </div>

        <div id="work-section" class="hidden">
            
            <div class="top-bar">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="dot-flashing" style="width: 10px; height: 10px;"></div>
                    <span id="chofer-nombre" style="font-weight: 600; font-size: 1.1rem;"></span>
                </div>
                <button class="btn-danger" id="btn-salir">Salir</button>
            </div>

            <div class="tabs">
                <div class="tab active" data-tab="ruta">📍 En Ruta</div>
                <div class="tab" data-tab="perfil">👤 Mi Perfil</div>
            </div>

            <div id="tab-ruta" class="tab-content">
                <div id="map"></div>

                <div id="pedido-en-ruta" class="current-order hidden">
                    <h3 style="color: var(--primary-blue); margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                        🚚 Pedido en curso
                    </h3>
                    <div class="order-meta">
                        <div><span>👤</span> <strong id="ruta-cliente" style="color: white;"></strong></div>
                        <div><span>📍</span> <span id="ruta-direccion"></span></div>
                        <div><span>📞</span> <span id="ruta-telefono"></span></div>
                    </div>
                    <div style="margin: 20px 0; padding: 12px; background: rgba(16, 185, 129, 0.1); border-radius: 12px; text-align: center;">
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Total a cobrar:</span>
                        <div class="monto-tag">$<span id="ruta-monto"></span></div>
                    </div>
                    <button class="btn btn-success" id="btn-entregar">Completar Entrega</button>
                    <p id="error-venta" style="color: var(--danger-red); font-size: 0.85rem; margin-top: 12px; display: none; text-align: center;"></p>
                </div>

                <div id="lista-pendientes" class="order-list">
                    </div>
            </div>

            <div id="tab-perfil" class="tab-content hidden">
                <div class="profile-section">
                    <div class="avatar-preview" id="avatar-preview"></div>
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="perfil-nombre" placeholder="Tu nombre">
                    </div>
                    <div class="form-group">
                        <label>Número de Teléfono</label>
                        <input type="tel" id="perfil-telefono" placeholder="Tu teléfono">
                    </div>
                    <div class="form-group">
                        <label>Foto de Perfil (URL)</label>
                        <input type="url" id="perfil-imagen" placeholder="https://ejemplo.com/foto.jpg">
                    </div>
                    <button class="btn" id="btn-guardar-perfil" style="margin-top: 10px;">Actualizar Datos</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://wzixsohxprcobfsmiksf.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6aXhzb2h4cHJjb2Jmc21pa3NmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0Njg1MjUsImV4cCI6MjA5NzA0NDUyNX0.xBVJVEKVBoKjVzOt9TtrDtD1XkAMriq-de4yZdV9nHE";
        const headers = {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Content-Type": "application/json"
        };

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let choferActual = null;
        let mapa = null;
        let marcadorChofer = null;
        let marcadorCliente = null;
        let miUbicacion = null;
        let miHeading = 0; 
        let envioUbicacionInterval = null;
        let pedidoEnRuta = null;
        let canalesActivos = [];

        // ----- INIT: Cargar LocalStorage -----
        document.addEventListener('DOMContentLoaded', () => {
            const telefonoGuardado = localStorage.getItem('choferTelefono');
            if (telefonoGuardado) {
                document.getElementById('telefonoChofer').value = telefonoGuardado;
            }
        });

        function unsubscribeAll() {
            canalesActivos.forEach(ch => supabaseClient.removeChannel(ch));
            canalesActivos = [];
        }

        // ----- NAVEGACIÓN -----
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabId = tab.dataset.tab;
                document.getElementById('tab-ruta').classList.toggle('hidden', tabId !== 'ruta');
                document.getElementById('tab-perfil').classList.toggle('hidden', tabId !== 'perfil');

                if (tabId === 'ruta') {
                    if (mapa) setTimeout(() => mapa.invalidateSize(), 100);
                    cargarPedidos();
                } else if (tabId === 'perfil') {
                    cargarPerfil();
                }
            });
        });

        // ----- LOGIN -----
        document.getElementById('btn-ingresar').addEventListener('click', async () => {
            const telefono = document.getElementById('telefonoChofer').value.trim();
            if (!telefono) {
                mostrarErrorLogin('Por favor, ingresa tu teléfono.');
                return;
            }
            
            const btn = document.getElementById('btn-ingresar');
            btn.disabled = true; btn.textContent = 'Conectando...';
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/choferes?telefono=eq.${telefono}&select=*&limit=1`, { headers });
                const choferes = await res.json();
                
                if (choferes.length === 0) {
                    mostrarErrorLogin('Número no registrado en el sistema.');
                    btn.disabled = false; btn.textContent = 'Ingresar al sistema';
                    return;
                }
                
                // Guardar en LocalStorage para la próxima vez
                localStorage.setItem('choferTelefono', telefono);
                
                choferActual = choferes[0];
                document.getElementById('chofer-nombre').textContent = choferActual.nombre;
                
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('work-section').classList.remove('hidden');
                document.getElementById('login-error').style.display = 'none';
                
                await iniciarApp();
            } catch (error) {
                mostrarErrorLogin('Error de conexión a la base de datos.');
                btn.disabled = false; btn.textContent = 'Ingresar al sistema';
            }
        });

        function mostrarErrorLogin(msg) {
            const errEl = document.getElementById('login-error');
            errEl.textContent = msg;
            errEl.style.display = 'block';
        }

        document.getElementById('btn-salir').addEventListener('click', () => {
            if (pedidoEnRuta) {
                alert('No puedes salir con un pedido en ruta. Entrégalo primero.');
                return;
            }
            // Limpiar datos
            if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
            unsubscribeAll();
            localStorage.removeItem('choferTelefono'); // Opcional: borrar el número guardado al salir
            choferActual = null;
            
            document.getElementById('work-section').classList.add('hidden');
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('telefonoChofer').value = '';
            document.getElementById('btn-ingresar').disabled = false;
            document.getElementById('btn-ingresar').textContent = 'Ingresar al sistema';
        });

        // ----- LÓGICA DE MAPA Y UBICACIÓN -----
        async function iniciarApp() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        miUbicacion = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        miHeading = pos.coords.heading || 0;
                        actualizarMarcadorChofer();
                    },
                    (err) => console.warn('Error GPS:', err),
                    { enableHighAccuracy: true }
                );
            }
            if (!miUbicacion) {
                try {
                    miUbicacion = await getCurrentPosition();
                } catch(e) {
                    // Posición por defecto si falla el GPS para que el mapa renderice
                    miUbicacion = { lat: 10.1620, lng: -68.0077 }; 
                }
            }
            initMap(miUbicacion.lat, miUbicacion.lng);
            await recuperarPedidoEnRuta();
            await cargarPedidos();
            subscribePendientes();
        }

        function initMap(lat, lng) {
            if (mapa) {
                setTimeout(() => mapa.invalidateSize(), 100);
                return;
            }
            mapa = L.map('map', { zoomControl: false }).setView([lat, lng], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(mapa);
            
            const arrowIcon = L.divIcon({
                html: '<div style="font-size: 28px; line-height: 1; transform-origin: center; transition: transform 0.3s; color: var(--primary-blue);">🚀</div>',
                className: '', iconSize: [28, 28], iconAnchor: [14, 14]
            });
            marcadorChofer = L.marker([lat, lng], { icon: arrowIcon }).addTo(mapa);
            actualizarRotacionFlecha();
        }

        function actualizarRotacionFlecha() {
            if (!marcadorChofer) return;
            const icon = marcadorChofer.getElement();
            if (icon) {
                const flecha = icon.querySelector('div');
                if (flecha) flecha.style.transform = `rotate(${miHeading}deg)`;
            }
        }

        function actualizarMarcadorChofer() {
            if (!marcadorChofer || !miUbicacion) return;
            marcadorChofer.setLatLng([miUbicacion.lat, miUbicacion.lng]);
            actualizarRotacionFlecha();
            if (!pedidoEnRuta) {
                mapa.setView([miUbicacion.lat, miUbicacion.lng], mapa.getZoom());
            }
        }

        function getCurrentPosition() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) reject('GPS no soportado');
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        miHeading = pos.coords.heading || 0;
                        resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude });
                    },
                    err => reject(err),
                    { enableHighAccuracy: true }
                );
            });
        }

        // ----- LÓGICA DE PEDIDOS -----
        async function recuperarPedidoEnRuta() {
            if (!choferActual) return;
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?chofer_id=eq.${choferActual.id}&estado=eq.en_ruta&select=id,lat,lng,cliente_id,monto,clientes(nombre,direccion,telefono)&limit=1`, { headers });
                const pedidos = await res.json();
                if (pedidos.length > 0) {
                    const p = pedidos[0];
                    pedidoEnRuta = {
                        id: p.id, latCliente: p.lat, lngCliente: p.lng,
                        choferId: choferActual.id, cliente_id: p.cliente_id, monto: p.monto,
                        cliente_nombre: p.clientes?.nombre, cliente_direccion: p.clientes?.direccion, cliente_telefono: p.clientes?.telefono
                    };
                    mostrarPedidoEnCurso();
                }
            } catch (error) { console.error('Error al recuperar pedido:', error); }
        }

        function mostrarPedidoEnCurso() {
            document.getElementById('ruta-cliente').textContent = pedidoEnRuta.cliente_nombre || '-';
            document.getElementById('ruta-direccion').textContent = pedidoEnRuta.cliente_direccion || '-';
            document.getElementById('ruta-telefono').textContent = pedidoEnRuta.cliente_telefono || '-';
            document.getElementById('ruta-monto').textContent = pedidoEnRuta.monto;
            
            document.getElementById('pedido-en-ruta').classList.remove('hidden');
            document.getElementById('lista-pendientes').classList.add('hidden');

            if (marcadorCliente) mapa.removeLayer(marcadorCliente);
            const clienteIcon = L.divIcon({ html: '📍', className: '', iconSize: [28, 28], iconAnchor: [14, 28] });
            marcadorCliente = L.marker([pedidoEnRuta.latCliente, pedidoEnRuta.lngCliente], { icon: clienteIcon }).addTo(mapa);
            
            const bounds = L.latLngBounds([[miUbicacion.lat, miUbicacion.lng], [pedidoEnRuta.latCliente, pedidoEnRuta.lngCliente]]);
            mapa.fitBounds(bounds, { padding: [40, 40] });

            if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
            envioUbicacionInterval = setInterval(enviarUbicacion, 5000);
            enviarUbicacion();
        }

        function subscribePendientes() {
            unsubscribeAll();
            const channel = supabaseClient
                .channel('pendientes-realtime')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos', filter: 'estado=eq.pendiente' }, () => {
                    if (!pedidoEnRuta) cargarPedidos();
                })
                .subscribe();
            canalesActivos.push(channel);
        }

        function renderEmptyState() {
            return `
                <div class="empty-state">
                    <div class="radar-container">
                        <div class="pulse-ring"></div>
                        <div class="pulse-ring"></div>
                        <span>💧</span>
                    </div>
                    <h3 style="margin-bottom: 8px; color: var(--text-main);">Sin pedidos pendientes</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Esperando nuevas solicitudes...</p>
                    <div class="realtime-status">
                        <div class="dot-flashing"></div>
                        Conectado en tiempo real
                    </div>
                </div>
            `;
        }

        async function cargarPedidos() {
            if (!choferActual || !miUbicacion) return;
            if (pedidoEnRuta) {
                document.getElementById('lista-pendientes').classList.add('hidden');
                return;
            }
            
            const listDiv = document.getElementById('lista-pendientes');
            listDiv.classList.remove('hidden');
            
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?estado=eq.pendiente&select=id,monto,fecha_pedido,lat,lng,cliente_id,clientes(nombre,direccion,telefono)&order=fecha_pedido.asc`, { headers });
                const pedidos = await res.json();

                if (marcadorCliente) { mapa.removeLayer(marcadorCliente); marcadorCliente = null; }

                if (pedidos.length === 0) {
                    listDiv.innerHTML = renderEmptyState();
                    return;
                }

                const pedidosConDistancia = pedidos.map(p => {
                    const dist = Math.sqrt(Math.pow(p.lat - miUbicacion.lat, 2) + Math.pow(p.lng - miUbicacion.lng, 2));
                    return { ...p, distancia: dist };
                }).sort((a, b) => a.distancia - b.distancia);

                listDiv.innerHTML = pedidosConDistancia.map(p => {
                    const cliente = p.clientes || {};
                    const km = (p.distancia * 111).toFixed(1);
                    return `
                        <div class="order-card">
                            <div class="order-header">
                                <span>${cliente.nombre || 'Cliente'}</span>
                                <span class="monto-tag">$${p.monto}</span>
                            </div>
                            <div class="order-meta">
                                <div><span>📍</span> ${cliente.direccion || 'Sin dirección'}</div>
                                <div><span>📞</span> ${cliente.telefono || 'N/D'}</div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px;">
                                <span class="badge">A ${km} km de ti</span>
                                <button class="btn" style="width: auto; padding: 10px 20px;" onclick="tomarPedido(${p.id}, ${p.lat}, ${p.lng}, ${p.cliente_id}, '${cliente.nombre?.replace(/'/g, "\\'") || 'Cliente'}', '${cliente.direccion?.replace(/'/g, "\\'") || ''}', '${cliente.telefono?.replace(/'/g, "\\'") || ''}', ${p.monto})">
                                    Tomar pedido
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                listDiv.innerHTML = '<p style="color:var(--danger-red); text-align:center;">Error al cargar pedidos.</p>';
            }
        }

        window.tomarPedido = async function(pedidoId, latCliente, lngCliente, clienteId, nombreCliente, direccionCliente, telefonoCliente, monto) {
            if (!choferActual) return;
            if (!confirm('¿Confirmar que tomas este pedido?')) return;

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?id=eq.${pedidoId}`, {
                    method: 'PATCH',
                    headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ estado: 'en_ruta', chofer_id: choferActual.id })
                });
                if (!res.ok) throw new Error(await res.text());

                pedidoEnRuta = {
                    id: pedidoId, latCliente, lngCliente, choferId: choferActual.id, cliente_id: clienteId,
                    monto: monto, cliente_nombre: nombreCliente, cliente_direccion: direccionCliente, cliente_telefono: telefonoCliente
                };
                mostrarPedidoEnCurso();
            } catch (error) { alert('Error al tomar pedido: ' + error.message); }
        };

        document.getElementById('btn-entregar').addEventListener('click', async () => {
            if (!pedidoEnRuta) return;
            if (!confirm('¿Confirmar entrega del pedido?')) return;
            
            const btn = document.getElementById('btn-entregar');
            btn.disabled = true; btn.textContent = 'Procesando...';
            document.getElementById('error-venta').style.display = 'none';
            
            try {
                const now = new Date().toISOString();
                const patchRes = await fetch(`${SUPABASE_URL}/rest/v1/pedidos?id=eq.${pedidoEnRuta.id}`, {
                    method: 'PATCH', headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ estado: 'completado', fecha_entrega: now })
                });
                if (!patchRes.ok) throw new Error(await patchRes.text());

                const ventaRes = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
                    method: 'POST', headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({
                        pedido_id: pedidoEnRuta.id, cliente_id: pedidoEnRuta.cliente_id,
                        chofer_id: choferActual.id, monto_final: pedidoEnRuta.monto,
                        metodo_pago: 'efectivo', fecha_completado: now
                    })
                });

                if (!ventaRes.ok) throw new Error(await ventaRes.text());

                pedidoEnRuta = null;
                if (envioUbicacionInterval) clearInterval(envioUbicacionInterval);
                if (marcadorCliente) { mapa.removeLayer(marcadorCliente); marcadorCliente = null; }
                
                document.getElementById('pedido-en-ruta').classList.add('hidden');
                document.getElementById('lista-pendientes').classList.remove('hidden');
                
                btn.disabled = false; btn.textContent = 'Completar Entrega';
                await cargarPedidos();
            } catch (error) {
                btn.disabled = false; btn.textContent = 'Completar Entrega';
                const errEl = document.getElementById('error-venta');
                errEl.textContent = 'Error al procesar: ' + error.message;
                errEl.style.display = 'block';
            }
        });

        async function enviarUbicacion() {
            if (!pedidoEnRuta || !choferActual || !miUbicacion) return;
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/ubicaciones_repartidor`, {
                    method: 'POST', headers: { ...headers, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ chofer_id: choferActual.id, lat: miUbicacion.lat, lng: miUbicacion.lng })
                });
            } catch (e) {}
        }

        // ----- PERFIL -----
        function cargarPerfil() {
            if (!choferActual) return;
            document.getElementById('perfil-nombre').value = choferActual.nombre || '';
            document.getElementById('perfil-telefono').value = choferActual.telefono || '';
            document.getElementById('perfil-imagen').value = choferActual.imagen_url || '';
            
            const avatar = document.getElementById('avatar-preview');
            avatar.style.backgroundImage = choferActual.imagen_url ? `url(${choferActual.imagen_url})` : `url('https://ui-avatars.com/api/?name=${encodeURIComponent(choferActual.nombre)}&background=0ea5e9&color=fff')`;
        }

        document.getElementById('btn-guardar-perfil').addEventListener('click', async () => {
            if (!choferActual) return;
            const nombre = document.getElementById('perfil-nombre').value.trim();
            const telefono = document.getElementById('perfil-telefono').value.trim();
            const imagen_url = document.getElementById('perfil-imagen').value.trim();

            if (!nombre || !telefono) return alert('Nombre y teléfono son obligatorios.');

            const btn = document.getElementById('btn-guardar-perfil');
            btn.disabled = true; btn.textContent = 'Guardando...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/choferes?id=eq.${choferActual.id}`, {
                    method: 'PATCH', headers: { ...headers, 'Prefer': 'return=representation' },
                    body: JSON.stringify({ nombre, telefono, imagen_url })
                });
                if (!res.ok) throw new Error(await res.text());
                
                const actualizado = await res.json();
                choferActual = actualizado[0];
                
                // Actualizar localStorage si cambia el teléfono
                localStorage.setItem('choferTelefono', choferActual.telefono);
                
                document.getElementById('chofer-nombre').textContent = choferActual.nombre;
                cargarPerfil();
                alert('Perfil actualizado con éxito.');
            } catch (e) {
                alert('Error al guardar: ' + e.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Actualizar Datos';
            }
        });
    </script>
</body>
</html>
